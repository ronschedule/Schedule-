<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Schedule</title>

<style>

body{

    margin:0;

    font-family:-apple-system,BlinkMacSystemFont,sans-serif;

    background:#f3f7fb;

}

header{

    background:#4A90E2;

    color:white;

    text-align:center;

    padding:20px;

    font-size:28px;

    font-weight:bold;

}

.card{

    background:white;

    margin:15px;

    padding:18px;

    border-radius:18px;

    box-shadow:0 3px 10px rgba(0,0,0,.08);

}

.card h2{

    margin-top:0;

}

.menu{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:15px;

    padding:15px;

}

button{

    border:none;

    border-radius:18px;

    padding:20px;

    font-size:20px;

    background:white;

    box-shadow:0 3px 10px rgba(0,0,0,.08);

}

button:hover{

    background:#e9f2ff;

}

</style>

</head>

<body>

<header>

📅 Schedule

</header>

<div class="card">

<h2>📅 今日の予定</h2>

<p>今日は予定がありません。</p>

</div>

<div class="menu">

<button onclick="showCalendar()">📆 今月の予定</button>

<button> onclick="showLesson()">👨‍🏫 レッスン</button>

<button>💼 仕事</button>

<button>🏠 プライベート</button>

<button>📝 ToDo</button>

<button>⚙️ 設定</button>

</div>

<div id="calendarPage" style="display:none;">

<h2>📆 今月の予定</h2>

<table border="1" width="100%">

<tr>

<th>日</th>

<th>月</th>

<th>火</th>

<th>水</th>

<th>木</th>

<th>金</th>

<th>土</th>

</tr>

<tr>

<td></td><td></td><td></td><td>1</td><td>2</td><td>3</td><td>4</td>

</tr>

<tr>

<td>5</td><td>6</td><td>7</td><td>8</td><td>9</td><td>10</td><td>11</td>

</tr>

<tr>

<td>12</td><td>13</td><td>14</td><td>15</td><td>16</td><td>17</td><td>18</td>

</tr>

<tr>

<td>19</td><td>20</td><td>21</td><td>22</td><td>23</td><td>24</td><td>25</td>

</tr>

<tr>

<td>26</td><td>27</td><td>28</td><td>29</td><td>30</td><td>31</td><td></td>

</tr>

</table>

<br>

<button onclick="backHome()">← 戻る</button>

</div>
    
<script>

function showCalendar(){

  document.getElementById("calendarPage").style.display="block";

  document.querySelector(".menu").style.display="none";

}

function showLesson(){

  document.getElementById("lessonPage").style.display="block";

  document.querySelector(".menu").style.display="none";

}function backHome(){

  document.getElementById("calendarPage").style.display="none";

  document.querySelector(".menu").style.display="block";

}

</script>

<div id="lessonPage" style="display:none;">

<h2>👨‍🏫 レッスン</h2>

<table border="1" width="100%">

<tr>

<th>日付</th>

<th>時間</th>

<th>生徒</th>

<th>内容</th>

</tr>

<tr>

<td>7/21</td>

<td>17:00</td>

<td>〇〇さん</td>

<td>英語</td>

</tr>

<tr>

<td>7/22</td>

<td>18:30</td>

<td>〇〇さん</td>

<td>英語</td>

</tr>

</table>

<br>

<button onclick="backHome()">← 戻る</button>

</div>

</body>

</html>
