<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Schedule</title>

<style>

body{

    margin:0;

    font-family:-apple-system,BlinkMacSystemFont,sans-serif;

    background:#f3f7fb;

}

header{

    background:#4A90E2;

    color:white;

    text-align:center;

    padding:20px;

    font-size:28px;

    font-weight:bold;

}

.card{

    background:white;

    margin:15px;

    padding:18px;

    border-radius:18px;

    box-shadow:0 3px 10px rgba(0,0,0,.08);

}

.card h2{

    margin-top:0;

}

.menu{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:15px;

    padding:15px;

}

button{

    border:none;

    border-radius:18px;

    padding:20px;

    font-size:20px;

    background:white;

    box-shadow:0 3px 10px rgba(0,0,0,.08);

}

button:hover{

    background:#e9f2ff;

}

</style>

</head>

<body>

<header>

📅 Schedule

</header>

<div class="card">

<h2>📅 今日の予定</h2>

<p>今日は予定がありません。</p>

</div>

<div class="menu">

<button>📆 今月の予定</button>

<button>👨‍🏫 レッスン</button>

<button>💼 仕事</button>

<button>🏠 プライベート</button>

<button>📝 ToDo</button>

<button>⚙️ 設定</button>

</div>

</body>

</html>
